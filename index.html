<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bouldering Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --cream: #F5F0E8; --warm: #FAF7F2; --chalk: #EDE8DE;
  --stone: #C4B9A8; --rock: #7A6E63; --deep: #2C2520;
  --rust: #B85C38; --moss: #6B7C5C; --sky: #7A9BB5;
  --gold: #C4962A; --lr: #F5E6DF; --lm: #E8EDE4; --ls: #E3ECF2;
}
body { background:var(--cream); font-family:'DM Mono',monospace; color:var(--deep); min-height:100vh; }

/* ── LAYOUT ── */
.app { max-width:960px; margin:0 auto; padding:32px 24px; }

/* ── HEADER ── */
.header { display:flex; justify-content:space-between; align-items:flex-end; border-bottom:2px solid var(--deep); padding-bottom:16px; margin-bottom:28px; }
.header h1 { font-family:'Playfair Display',serif; font-size:36px; font-weight:700; color:var(--deep); }
.header h1 em { color:var(--rust); font-style:italic; }
.header-sub { font-size:10px; letter-spacing:.15em; color:var(--rock); text-align:right; line-height:1.8; text-transform:uppercase; }

/* ── DASHBOARD ── */
.dashboard { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:28px; }
.stat-card { background:var(--warm); border:1px solid var(--stone); border-radius:2px; padding:16px 14px; }
.stat-label { font-size:9px; letter-spacing:.18em; text-transform:uppercase; color:var(--rock); margin-bottom:6px; }
.stat-value { font-family:'Playfair Display',serif; font-size:32px; font-weight:700; color:var(--deep); line-height:1; }
.stat-sub { font-size:10px; color:var(--rock); margin-top:4px; }
.stat-card.accent { border-top:3px solid var(--rust); }

/* streak bar */
.streak-dots { display:flex; gap:4px; margin-top:8px; flex-wrap:wrap; }
.streak-dot { width:10px; height:10px; border-radius:50%; background:var(--chalk); border:1px solid var(--stone); }
.streak-dot.filled { background:var(--rust); border-color:var(--rust); }
.streak-dot.free { background:var(--sky); border-color:var(--sky); }

/* ── WEEK NAV ── */
.week-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.week-label { font-family:'Playfair Display',serif; font-size:20px; font-weight:700; }
.week-label span { font-family:'DM Mono',monospace; font-size:12px; color:var(--rock); font-weight:400; margin-left:10px; }
.btn { background:var(--deep); color:var(--cream); border:none; font-family:'DM Mono',monospace; font-size:11px; padding:8px 16px; cursor:pointer; border-radius:2px; letter-spacing:.05em; }
.btn:hover { background:var(--rust); }
.btn.outline { background:transparent; color:var(--deep); border:1px solid var(--stone); }
.btn.outline:hover { border-color:var(--rust); color:var(--rust); }
.btn-sm { padding:5px 10px; font-size:10px; }

/* ── SESSION LOG GRID ── */
.sessions-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:28px; }

/* ── SESSION CARD ── */
.session-card { background:var(--warm); border:1px solid var(--stone); border-radius:2px; overflow:hidden; }
.session-card.logged { border-top:3px solid var(--rust); }
.session-card.free { border-top:3px solid var(--sky); }
.session-card.empty { border-top:3px solid var(--chalk); opacity:.7; }
.session-header { padding:12px 14px 8px; border-bottom:1px solid var(--chalk); display:flex; justify-content:space-between; align-items:center; }
.session-date { font-size:10px; letter-spacing:.1em; color:var(--rock); text-transform:uppercase; }
.session-tag { font-size:9px; padding:2px 7px; border-radius:1px; letter-spacing:.08em; text-transform:uppercase; }
.tag-train { background:var(--lr); color:var(--rust); }
.tag-free { background:var(--ls); color:var(--sky); }
.tag-empty { background:var(--chalk); color:var(--stone); }
.session-body { padding:12px 14px; }
.technique-name { font-family:'Playfair Display',serif; font-size:14px; font-weight:700; color:var(--deep); margin-bottom:4px; }
.technique-cue { font-size:10px; color:var(--rock); font-style:italic; margin-bottom:10px; line-height:1.5; }

/* checklist */
.checklist { list-style:none; }
.checklist li { display:flex; align-items:flex-start; gap:8px; margin-bottom:6px; font-size:11px; line-height:1.4; }
.checklist li input[type=checkbox] { appearance:none; width:14px; height:14px; border:1.5px solid var(--stone); border-radius:1px; cursor:pointer; flex-shrink:0; margin-top:1px; position:relative; }
.checklist li input[type=checkbox]:checked { background:var(--rust); border-color:var(--rust); }
.checklist li input[type=checkbox]:checked::after { content:'✓'; position:absolute; top:-1px; left:1px; font-size:10px; color:white; }
.checklist li.checked-item label { text-decoration:line-through; color:var(--stone); }
.checklist li label { cursor:pointer; color:var(--deep); }

.sub-label { font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:var(--stone); margin:8px 0 4px; }

/* grade inputs */
.grade-row { display:flex; gap:6px; margin-bottom:8px; align-items:center; }
.grade-row label { font-size:10px; color:var(--rock); min-width:60px; }
.grade-input { font-family:'DM Mono',monospace; font-size:11px; background:var(--chalk); border:1px solid var(--stone); padding:4px 8px; border-radius:1px; width:60px; color:var(--deep); }
.grade-input:focus { outline:none; border-color:var(--rust); }

/* notes */
.notes-area { font-family:'DM Mono',monospace; font-size:11px; background:var(--chalk); border:1px solid var(--stone); border-radius:1px; padding:8px; width:100%; resize:vertical; min-height:52px; color:var(--deep); margin-top:8px; }
.notes-area:focus { outline:none; border-color:var(--rust); }
.notes-area::placeholder { color:var(--stone); }

.session-footer { padding:8px 14px 12px; display:flex; gap:6px; }

/* ── TECHNIQUE MODAL ── */
.modal-backdrop { position:fixed; inset:0; background:rgba(44,37,32,.55); display:none; z-index:100; align-items:center; justify-content:center; }
.modal-backdrop.open { display:flex; }
.modal { background:var(--warm); border:1px solid var(--stone); border-radius:2px; max-width:580px; width:90%; max-height:85vh; overflow-y:auto; padding:28px; position:relative; }
.modal-close { position:absolute; top:14px; right:14px; background:none; border:none; font-size:18px; cursor:pointer; color:var(--rock); }
.modal-close:hover { color:var(--rust); }
.modal h2 { font-family:'Playfair Display',serif; font-size:22px; font-weight:700; margin-bottom:4px; }
.modal-sub { font-size:10px; color:var(--rock); letter-spacing:.12em; text-transform:uppercase; margin-bottom:16px; }
.modal-section { margin-bottom:16px; }
.modal-section h3 { font-size:11px; letter-spacing:.15em; text-transform:uppercase; color:var(--rust); margin-bottom:6px; border-bottom:1px solid var(--lr); padding-bottom:4px; }
.modal-section p { font-size:12px; line-height:1.7; color:var(--deep); }
.modal-section ul { padding-left:16px; }
.modal-section ul li { font-size:12px; line-height:1.7; color:var(--deep); margin-bottom:3px; }

/* ── LOG HISTORY ── */
.history-section { margin-top:8px; }
.history-title { font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--rock); border-bottom:1px solid var(--stone); padding-bottom:8px; margin-bottom:14px; }
.history-row { display:grid; grid-template-columns:100px 1fr 80px 80px 80px; gap:8px; align-items:center; padding:8px 0; border-bottom:1px solid var(--chalk); font-size:11px; }
.history-row.header-row { font-size:9px; letter-spacing:.12em; text-transform:uppercase; color:var(--stone); border-bottom:1px solid var(--stone); }
.history-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:6px; }

/* ── ADD SESSION PANEL ── */
.add-panel { background:var(--warm); border:1px solid var(--stone); border-top:3px solid var(--moss); border-radius:2px; padding:20px; margin-bottom:28px; }
.add-panel h2 { font-family:'Playfair Display',serif; font-size:18px; margin-bottom:14px; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
.form-group { display:flex; flex-direction:column; gap:4px; }
.form-group label { font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--rock); }
.form-group select, .form-group input { font-family:'DM Mono',monospace; font-size:12px; background:var(--chalk); border:1px solid var(--stone); padding:7px 10px; border-radius:1px; color:var(--deep); }
.form-group select:focus, .form-group input:focus { outline:none; border-color:var(--rust); }

/* ── RESPONSIVE ── */
@media(max-width:700px) {
  .dashboard { grid-template-columns:repeat(2,1fr); }
  .sessions-grid { grid-template-columns:1fr; }
  .history-row { grid-template-columns:90px 1fr 60px; }
  .history-row .hist-grade, .history-row .hist-streak { display:none; }
}
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div>
      <div style="font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--rock);margin-bottom:4px">Bouldering Tracker</div>
      <h1>Move well. <em>Get better.</em></h1>
    </div>
    <div class="header-sub">
      Franchesca · Movement Gym<br>
      V3–V4 · Target: V5
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard"></div>

  <!-- WEEK NAVIGATION -->
  <div class="week-bar">
    <div>
      <button class="btn outline btn-sm" onclick="changeWeek(-1)">← Prev</button>
      <button class="btn outline btn-sm" style="margin-left:6px" onclick="changeWeek(1)">Next →</button>
      <button class="btn outline btn-sm" style="margin-left:6px" onclick="goToCurrentWeek()">This Week</button>
    </div>
    <div class="week-label" id="weekLabel">Week — <span id="weekRange"></span></div>
    <button class="btn btn-sm" onclick="openAddPanel()">+ Log Session</button>
  </div>

  <!-- ADD SESSION PANEL -->
  <div class="add-panel" id="addPanel" style="display:none">
    <h2>Log a Session</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="logDate">
      </div>
      <div class="form-group">
        <label>Session Type</label>
        <select id="logType">
          <option value="train">Training Session</option>
          <option value="free">Free Climb (with friend)</option>
        </select>
      </div>
    </div>
    <div class="form-row" id="gradeRow">
      <div class="form-group">
        <label>Highest Grade Attempted</label>
        <input type="text" id="logAttempted" placeholder="e.g. V4">
      </div>
      <div class="form-group">
        <label>Highest Grade Sent</label>
        <input type="text" id="logSent" placeholder="e.g. V3">
      </div>
    </div>
    <div class="form-group" style="margin-bottom:12px">
      <label>Notes</label>
      <textarea class="notes-area" id="logNotes" placeholder="What felt good? What was hard? Any technique wins?"></textarea>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn" onclick="saveSession()">Save Session</button>
      <button class="btn outline" onclick="closeAddPanel()">Cancel</button>
    </div>
  </div>

  <!-- SESSIONS GRID -->
  <div class="sessions-grid" id="sessionsGrid"></div>

  <!-- HISTORY LOG -->
  <div class="history-section">
    <div class="history-title">Full Session Log</div>
    <div class="history-row header-row">
      <div>Date</div>
      <div>Technique</div>
      <div class="hist-grade">Attempted</div>
      <div class="hist-grade">Sent</div>
      <div class="hist-streak">Type</div>
    </div>
    <div id="historyLog"></div>
  </div>

</div>

<!-- TECHNIQUE DETAIL MODAL -->
<div class="modal-backdrop" id="modalBackdrop" onclick="closeModal(event)">
  <div class="modal" id="modalContent">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <div id="modalBody"></div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────

const TECHNIQUES = [
  {
    name: "Footwork",
    cue: "\"Look at my foot before I step.\"",
    why: "Most V4 climbers muscle through with arms. Precise feet save grip for the crux.",
    how: "Place the inside edge or toe tip on every hold — not the flat of your shoe. Look at the hold before stepping. Aim for zero adjustment after landing. If your foot shuffles after landing, you placed it wrong.",
    practice: [
      "On 5 climbs in your volume block, narrate your feet quietly: \"inside edge, toe tip\" every move.",
      "Pick 3 V1–V2 problems. Rule: if your foot moves after landing, come down and restart. Do 2–3 attempts each.",
      "Find one smear-y problem and practice loading it slowly before committing weight. 3–5 attempts."
    ],
    color: "#B85C38"
  },
  {
    name: "Hip Position",
    cue: "\"Turn one hip before I reach.\"",
    why: "Hips are your heaviest body part. Wrong position = arms do everything. Right position = legs help.",
    how: "On vertical: turn one hip toward the wall before reaching for the next hand hold. On overhangs: drive hips toward the wall and keep them close — sagging hips = dead hang = pump. Flag the free leg when you feel unstable.",
    practice: [
      "On 3 vertical V2–V3 problems, consciously turn your hip before every hand move. Even when unnecessary — build the habit.",
      "Pick one overhang. Before pulling, drive hips toward the wall and hold for 2 seconds mid-climb. 3–4 attempts.",
      "Find a problem where you feel unstable on one foot. Experiment with flagging the free leg. 1–2 problems."
    ],
    color: "#6B7C5C"
  },
  {
    name: "Route Reading",
    cue: "\"30 seconds before I touch the wall.\"",
    why: "Every second spent puzzling mid-climb is pump. Reading before pulling is free rest and free beta.",
    how: "Stand below the problem for 30–60 seconds. Identify: right hand first? Left foot? Where is the crux? Where can I rest? What does each hold's direction tell me about where my body should be?",
    practice: [
      "Make 30 seconds of reading non-negotiable on every V3+ attempt. Time yourself — it feels longer than you think.",
      "On your challenge zone problems, verbally identify the crux before climbing. After falling, ask: did I plan that move? Adjust and retry.",
      "Climb one problem twice: once instinctively, once reading every hold direction first. Compare how it felt."
    ],
    color: "#7A9BB5"
  },
  {
    name: "Back Engagement",
    cue: "\"Shoulder blade down, then pull.\"",
    why: "Pulling with arms alone burns grip fast. Your back is a much larger muscle — use it.",
    how: "Before pulling a hold, think: squeeze shoulder blades down and together first. The pull should feel like it starts in your back, not your elbow. Never move your hand before your foot.",
    practice: [
      "On 3 problems per session, pause at each pulling move and cue \"back first.\" It will feel slow. That's the point. 2–3 laps each.",
      "Session rule: hand moves only after a foot has moved. If you break it, come down and restart that section."
    ],
    color: "#2C2520"
  },
  {
    name: "Rest Positions",
    cue: "\"Hang straight, shake out on every jug.\"",
    why: "At V5 problems are longer. If you can't recover mid-route, you run out of grip before the top.",
    how: "Hang with arms fully straight whenever possible — straight arms load your skeleton, bent arms fatigue biceps. On any jug: drop arm below waist, open and close hand 10–15 times. Alternate arms. During route reading, identify where you'll rest before you start.",
    practice: [
      "On every easy climb, practice hanging straight-armed on each hold you pass. Make it a reflex.",
      "Rule: if there's a jug anywhere in a problem, stop and shake out on it even if you don't feel pumped.",
      "During route reading, point to your rest position before climbing. After: did you actually use it?"
    ],
    color: "#C4962A"
  },
  {
    name: "Heel & Toe Hooks",
    cue: "\"Is there anything my heel or toe could hook?\"",
    why: "Some V4 routes require them — you simply can't finish without them. Learning to spot when to use one is the real skill.",
    how: "Heel hook: hook the back of your heel over a hold and actively pull with your hamstring — it should feel like your leg is pulling, not resting. Drive the heel down. Toe hook: hook the top of your toe and flex your foot — your foot must pull, not just touch, or it slips.",
    practice: [
      "When you fall on a steep move, look around your feet before retrying: is there anything my heel could hook? 2–3 attempts per problem.",
      "Find one problem per session where you're swinging off. Try a toe hook to counter the swing. 1–2 problems.",
      "During route reading, scan for heel and toe opportunities the same way you scan for hand holds."
    ],
    color: "#7A9BB5"
  },
  {
    name: "Falling Safely",
    cue: "\"Bend knees, tuck chin, land on feet first.\"",
    why: "Relaxed falling = willingness to try hard moves = faster progression. Fear of falling is a limiter at every grade.",
    how: "When you feel yourself coming off: let go intentionally rather than clinging. Bend your knees as you drop. Keep chin tucked, arms slightly out for balance (not locked straight). Land on the balls of your feet first, let your knees absorb. Never reach back with straight arms — wrists break that way.",
    practice: [
      "Warm-up fall practice: on a V0–V1, climb 3 moves up and intentionally step off. Do 3–5 times per session until it feels normal.",
      "Practice falling from the crux of a problem you keep bailing on. Knowing what the fall feels like removes the fear.",
      "After any unexpected fall, ask: did I tense up? Try to recreate the fall intentionally and stay loose."
    ],
    color: "#B85C38"
  }
];

// Session checklist template
const CHECKLIST = {
  warmup: [
    { id: "wu1", text: "Light bicep curls (wake up elbows)" },
    { id: "wu2", text: "Lateral raises — 10–12 reps, light" },
    { id: "wu3", text: "Hangboard jugs: 7s hang / 3s rest × 5 reps" },
    { id: "wu4", text: "Hangboard 4-finger pocket: same protocol" },
    { id: "wu5", text: "V0–V1 easy climbing until grip feels warm" }
  ],
  volume: [
    { id: "v1", text: "V1–V3 volume climbing with technique cue applied" },
    { id: "v2", text: "Applied cue to every climb, not just some" },
    { id: "v3", text: "Noticed one moment the cue changed something" }
  ],
  challenge: [
    { id: "c1", text: "Read the route for 30s before touching" },
    { id: "c2", text: "Attempted 1–2 V3–V4 problems" },
    { id: "c3", text: "After falling, adjusted approach before retry" }
  ],
  cooldown: [
    { id: "cd1", text: "Forearm stretch — both sides" },
    { id: "cd2", text: "Shoulder/chest opener" },
    { id: "cd3", text: "Lat stretch" },
    { id: "cd4", text: "Noted one thing I did well today" }
  ]
};

// ── STATE ─────────────────────────────────────────────────────────────────────

let sessions = JSON.parse(localStorage.getItem('bouldSessions') || '[]');
let techniqueIndex = parseInt(localStorage.getItem('bouldTechIdx') || '0');
let currentWeekOffset = 0;

function saveState() {
  localStorage.setItem('bouldSessions', JSON.stringify(sessions));
  localStorage.setItem('bouldTechIdx', techniqueIndex);
}

// ── DATE HELPERS ──────────────────────────────────────────────────────────────

function getWeekStart(offset = 0) {
  const now = new Date();
  const day = now.getDay();
  const diff = now.getDate() - day + (day === 0 ? -6 : 1);
  const monday = new Date(now.setDate(diff + offset * 7));
  monday.setHours(0,0,0,0);
  return monday;
}

function formatDate(d) {
  return new Date(d).toLocaleDateString('en-US', { month:'short', day:'numeric' });
}

function formatDateFull(d) {
  return new Date(d).toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
}

function isoDate(d) {
  return new Date(d).toISOString().split('T')[0];
}

function sessionsInWeek(weekStart) {
  const end = new Date(weekStart); end.setDate(end.getDate() + 7);
  return sessions.filter(s => {
    const d = new Date(s.date);
    return d >= weekStart && d < end;
  }).sort((a,b) => new Date(a.date) - new Date(b.date));
}

// ── TECHNIQUE ROTATION ────────────────────────────────────────────────────────

function getNextTechnique() {
  return TECHNIQUES[techniqueIndex % TECHNIQUES.length];
}

function advanceTechnique() {
  techniqueIndex = (techniqueIndex + 1) % TECHNIQUES.length;
  saveState();
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────

function renderDashboard() {
  const totalTrain = sessions.filter(s => s.type === 'train').length;
  const totalFree = sessions.filter(s => s.type === 'free').length;
  const total = sessions.length;

  // streak
  let streak = 0;
  const sortedDates = [...new Set(sessions.map(s => isoDate(s.date)))].sort().reverse();
  const today = isoDate(new Date());
  for (let i = 0; i < sortedDates.length; i++) {
    const d = new Date(sortedDates[i]);
    const expected = new Date(); expected.setDate(expected.getDate() - i);
    if (isoDate(d) === isoDate(expected)) streak++;
    else break;
  }

  // weeks climbing
  const weeksCl = new Set(sessions.map(s => {
    const ws = getWeekStart(0);
    const d = new Date(s.date);
    return Math.floor((ws - d) / (7*86400000));
  })).size;

  // this week
  const thisWeekSessions = sessionsInWeek(getWeekStart(0));
  const thisWeekTrain = thisWeekSessions.filter(s => s.type === 'train').length;

  // build streak dots (last 12 sessions)
  const last12 = sessions.slice(-12);
  const dots = last12.map(s => `<div class="streak-dot ${s.type === 'train' ? 'filled' : 'free'}"></div>`).join('');

  document.getElementById('dashboard').innerHTML = `
    <div class="stat-card accent">
      <div class="stat-label">This Week</div>
      <div class="stat-value">${thisWeekTrain}<span style="font-size:16px;color:var(--stone)">/3</span></div>
      <div class="stat-sub">training sessions</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Sessions</div>
      <div class="stat-value">${totalTrain}</div>
      <div class="stat-sub">${totalFree} free climbs</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Current Streak</div>
      <div class="stat-value">${streak}</div>
      <div class="stat-sub">sessions in a row</div>
      <div class="streak-dots">${dots}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Next Technique</div>
      <div style="font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--rust);margin-top:4px;line-height:1.3">${getNextTechnique().name}</div>
      <div class="stat-sub" style="margin-top:4px;font-style:italic">${getNextTechnique().cue}</div>
    </div>
  `;
}

// ── SESSIONS GRID ─────────────────────────────────────────────────────────────

function renderWeek() {
  const ws = getWeekStart(currentWeekOffset);
  const we = new Date(ws); we.setDate(we.getDate() + 6);
  document.getElementById('weekLabel').innerHTML = `Week of <span>${formatDate(ws)} – ${formatDate(we)}</span>`;

  const weekSessions = sessionsInWeek(ws);
  const trainSessions = weekSessions.filter(s => s.type === 'train');
  const freeSessions = weekSessions.filter(s => s.type === 'free');

  // Build 3 training slots + 1 free slot
  const slots = [
    { slot: 1, session: trainSessions[0] || null },
    { slot: 2, session: trainSessions[1] || null },
    { slot: 3, session: trainSessions[2] || null },
  ];
  if (freeSessions.length > 0) slots.push({ slot: 'free', session: freeSessions[0] });

  const grid = document.getElementById('sessionsGrid');
  grid.innerHTML = slots.map(({ slot, session }) => {
    if (!session) return renderEmptySlot(slot);
    if (session.type === 'free') return renderFreeSession(session);
    return renderTrainSession(session);
  }).join('');
}

function renderEmptySlot(slot) {
  const label = slot === 'free' ? 'Free Climb' : `Training Session ${slot}`;
  return `
    <div class="session-card empty">
      <div class="session-header">
        <div class="session-date">${label}</div>
        <span class="session-tag tag-empty">Pending</span>
      </div>
      <div class="session-body" style="padding-top:20px;padding-bottom:20px;text-align:center;color:var(--stone);font-size:11px">
        Not yet logged
      </div>
    </div>`;
}

function renderFreeSession(s) {
  return `
    <div class="session-card free">
      <div class="session-header">
        <div class="session-date">${formatDateFull(s.date)}</div>
        <span class="session-tag tag-free">Free Climb</span>
      </div>
      <div class="session-body">
        <div class="technique-name" style="color:var(--sky)">Fun session 🧗</div>
        <div class="technique-cue">Climbing with friend — no structure required</div>
        ${s.attempted ? `<div style="font-size:11px;color:var(--rock);margin-bottom:4px">Attempted: <strong>${s.attempted}</strong> · Sent: <strong>${s.sent || '—'}</strong></div>` : ''}
        ${s.notes ? `<div style="font-size:11px;color:var(--rock);margin-top:6px;font-style:italic">"${s.notes}"</div>` : ''}
      </div>
    </div>`;
}

function renderTrainSession(s) {
  const tech = TECHNIQUES.find(t => t.name === s.technique) || TECHNIQUES[0];

  const checklistHTML = (items, checks, sectionLabel) => `
    <div class="sub-label">${sectionLabel}</div>
    <ul class="checklist">
      ${items.map(item => {
        const checked = (checks || []).includes(item.id);
        return `<li class="${checked ? 'checked-item' : ''}">
          <input type="checkbox" id="${s.id}_${item.id}" ${checked ? 'checked' : ''}
            onchange="toggleCheck('${s.id}','${item.id}',this.checked)">
          <label for="${s.id}_${item.id}">${item.text}</label>
        </li>`;
      }).join('')}
    </ul>`;

  return `
    <div class="session-card logged">
      <div class="session-header">
        <div class="session-date">${formatDateFull(s.date)}</div>
        <span class="session-tag tag-train">Training</span>
      </div>
      <div class="session-body">
        <div class="technique-name" style="cursor:pointer;text-decoration:underline;text-decoration-color:var(--stone)"
          onclick="openTechModal('${tech.name}')">${tech.name}</div>
        <div class="technique-cue">${tech.cue}</div>

        ${s.attempted ? `<div style="font-size:11px;color:var(--rock);margin-bottom:8px">Attempted: <strong>${s.attempted}</strong> · Sent: <strong>${s.sent || '—'}</strong></div>` : ''}

        ${checklistHTML(CHECKLIST.warmup, s.checks, 'Warm-Up')}
        ${checklistHTML(CHECKLIST.volume, s.checks, 'Volume Block')}
        ${checklistHTML(CHECKLIST.challenge, s.checks, 'Challenge Zone')}

        ${s.notes ? `<div class="sub-label">Notes</div><div style="font-size:11px;color:var(--rock);font-style:italic;line-height:1.5">"${s.notes}"</div>` : ''}
      </div>
    </div>`;
}

// ── HISTORY ───────────────────────────────────────────────────────────────────

function renderHistory() {
  const sorted = [...sessions].sort((a,b) => new Date(b.date) - new Date(a.date));
  document.getElementById('historyLog').innerHTML = sorted.length === 0
    ? '<div style="font-size:11px;color:var(--stone);padding:12px 0">No sessions logged yet.</div>'
    : sorted.map(s => `
      <div class="history-row">
        <div>${formatDateFull(s.date)}</div>
        <div>
          <span class="history-dot" style="background:${s.type === 'free' ? 'var(--sky)' : 'var(--rust)'}"></span>
          ${s.type === 'free' ? 'Free Climb' : s.technique || '—'}
        </div>
        <div class="hist-grade">${s.attempted || '—'}</div>
        <div class="hist-grade">${s.sent || '—'}</div>
        <div class="hist-streak">${s.type === 'train' ? 'Training' : 'Free'}</div>
      </div>`).join('');
}

// ── INTERACTIONS ──────────────────────────────────────────────────────────────

function toggleCheck(sessionId, itemId, checked) {
  const s = sessions.find(s => s.id === sessionId);
  if (!s) return;
  if (!s.checks) s.checks = [];
  if (checked) { if (!s.checks.includes(itemId)) s.checks.push(itemId); }
  else s.checks = s.checks.filter(c => c !== itemId);
  saveState();
  // update label styling
  const lbl = document.querySelector(`label[for="${sessionId}_${itemId}"]`);
  if (lbl) lbl.closest('li').className = checked ? 'checked-item' : '';
}

function openAddPanel() {
  document.getElementById('addPanel').style.display = 'block';
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('logDate').value = today;
  document.getElementById('addPanel').scrollIntoView({ behavior: 'smooth' });
}

function closeAddPanel() {
  document.getElementById('addPanel').style.display = 'none';
}

function saveSession() {
  const date = document.getElementById('logDate').value;
  const type = document.getElementById('logType').value;
  const attempted = document.getElementById('logAttempted').value.trim();
  const sent = document.getElementById('logSent').value.trim();
  const notes = document.getElementById('logNotes').value.trim();
  if (!date) { alert('Please pick a date.'); return; }

  const tech = type === 'train' ? getNextTechnique().name : null;

  const session = {
    id: Date.now().toString(),
    date, type, attempted, sent, notes,
    technique: tech,
    checks: []
  };

  sessions.push(session);
  if (type === 'train') advanceTechnique();
  saveState();
  closeAddPanel();
  document.getElementById('logAttempted').value = '';
  document.getElementById('logSent').value = '';
  document.getElementById('logNotes').value = '';
  render();
}

function changeWeek(dir) {
  currentWeekOffset += dir;
  renderWeek();
}

function goToCurrentWeek() {
  currentWeekOffset = 0;
  renderWeek();
}

// ── TECHNIQUE MODAL ───────────────────────────────────────────────────────────

function openTechModal(name) {
  const t = TECHNIQUES.find(t => t.name === name);
  if (!t) return;
  document.getElementById('modalBody').innerHTML = `
    <h2>${t.name}</h2>
    <div class="modal-sub">Technique Focus</div>
    <div class="modal-section">
      <h3>The Cue</h3>
      <p style="font-size:15px;font-style:italic;color:var(--rust)">${t.cue}</p>
    </div>
    <div class="modal-section">
      <h3>Why It Matters</h3>
      <p>${t.why}</p>
    </div>
    <div class="modal-section">
      <h3>How to Do It</h3>
      <p>${t.how}</p>
    </div>
    <div class="modal-section">
      <h3>Practice in Session</h3>
      <ul>${t.practice.map(p => `<li>${p}</li>`).join('')}</ul>
    </div>
  `;
  document.getElementById('modalBackdrop').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalBackdrop')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modalBackdrop').classList.remove('open');
}

// ── RENDER ────────────────────────────────────────────────────────────────────

function render() {
  renderDashboard();
  renderWeek();
  renderHistory();
}

render();
</script>
</body>
</html>
