<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bouldering Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --cream:#F5F0E8;--warm:#FAF7F2;--chalk:#EDE8DE;
  --stone:#C4B9A8;--rock:#7A6E63;--deep:#2C2520;
  --rust:#B85C38;--moss:#6B7C5C;--sky:#7A9BB5;--gold:#C4962A;
  --lr:#F5E6DF;--lm:#E8EDE4;--ls:#E3ECF2;--lg:#F0EDE5;
}
body{background:var(--cream);font-family:'DM Mono',monospace;color:var(--deep);min-height:100vh;}
.app{max-width:980px;margin:0 auto;padding:32px 24px;}

/* HEADER */
.header{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:2px solid var(--deep);padding-bottom:16px;margin-bottom:28px;}
.header h1{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;}
.header h1 em{color:var(--rust);font-style:italic;}
.header-sub{font-size:10px;letter-spacing:.15em;color:var(--rock);text-align:right;line-height:1.8;text-transform:uppercase;}

/* DASHBOARD */
.dashboard{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px;}
.stat-card{background:var(--warm);border:1px solid var(--stone);border-radius:2px;padding:16px 14px;}
.stat-card.accent{border-top:3px solid var(--rust);}
.stat-label{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--rock);margin-bottom:6px;}
.stat-value{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;line-height:1;}
.stat-sub{font-size:10px;color:var(--rock);margin-top:4px;}
.streak-dots{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap;}
.streak-dot{width:10px;height:10px;border-radius:50%;background:var(--chalk);border:1px solid var(--stone);}
.streak-dot.filled{background:var(--rust);border-color:var(--rust);}
.streak-dot.free{background:var(--sky);border-color:var(--sky);}

/* WEEK BAR */
.week-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;}
.week-label{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;white-space:nowrap;}
.week-label span{font-family:'DM Mono',monospace;font-size:12px;color:var(--rock);font-weight:400;margin-left:10px;}
.btn{background:var(--deep);color:var(--cream);border:none;font-family:'DM Mono',monospace;font-size:11px;padding:8px 16px;cursor:pointer;border-radius:2px;letter-spacing:.05em;transition:background .15s;}
.btn:hover{background:var(--rust);}
.btn.outline{background:transparent;color:var(--deep);border:1px solid var(--stone);}
.btn.outline:hover{border-color:var(--rust);color:var(--rust);}
.btn.danger{background:transparent;color:#c0392b;border:1px solid #e8c4c0;}
.btn.danger:hover{background:#c0392b;color:white;}
.btn.moss{background:var(--moss);}
.btn-sm{padding:5px 11px;font-size:10px;}
.btn-xs{padding:3px 8px;font-size:9px;}

/* SESSIONS GRID */
.sessions-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:32px;}

/* SESSION CARD */
.session-card{background:var(--warm);border:1px solid var(--stone);border-radius:2px;overflow:hidden;display:flex;flex-direction:column;}
.session-card.active{border-top:3px solid var(--gold);}
.session-card.done{border-top:3px solid var(--moss);}
.session-card.free{border-top:3px solid var(--sky);}
.session-card.empty{border-top:3px solid var(--chalk);opacity:.65;}

.card-header{padding:10px 12px 8px;border-bottom:1px solid var(--chalk);display:flex;justify-content:space-between;align-items:center;gap:6px;}
.card-date{font-size:10px;letter-spacing:.08em;color:var(--rock);text-transform:uppercase;}
.card-actions{display:flex;gap:4px;flex-shrink:0;}
.card-tag{font-size:8px;padding:2px 7px;border-radius:1px;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;}
.tag-active{background:#FEF3E2;color:var(--gold);}
.tag-done{background:var(--lm);color:var(--moss);}
.tag-free{background:var(--ls);color:var(--sky);}
.tag-empty{background:var(--chalk);color:var(--stone);}

.card-body{padding:12px;flex:1;}

/* ACTIVE SESSION */
.tech-banner{background:var(--lr);border-left:3px solid var(--rust);padding:8px 10px;margin-bottom:12px;border-radius:1px;}
.tech-banner .tech-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--rust);cursor:pointer;}
.tech-banner .tech-name:hover{text-decoration:underline;}
.tech-banner .tech-cue{font-size:10px;color:var(--rock);margin-top:3px;font-style:italic;line-height:1.5;}

.section-label{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--stone);margin:10px 0 5px;}
.checklist{list-style:none;}
.checklist li{display:flex;align-items:flex-start;gap:7px;margin-bottom:5px;font-size:11px;line-height:1.4;}
.checklist li input[type=checkbox]{appearance:none;-webkit-appearance:none;width:13px;height:13px;border:1.5px solid var(--stone);border-radius:1px;cursor:pointer;flex-shrink:0;margin-top:2px;position:relative;}
.checklist li input[type=checkbox]:checked{background:var(--rust);border-color:var(--rust);}
.checklist li input[type=checkbox]:checked::after{content:'✓';position:absolute;top:-1px;left:1px;font-size:9px;color:white;font-weight:bold;}
.checklist li label{cursor:pointer;color:var(--deep);}
.checklist li.done-item label{text-decoration:line-through;color:var(--stone);}

.inline-field{margin-top:8px;}
.inline-field label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--stone);display:block;margin-bottom:3px;}
.inline-row{display:flex;gap:8px;}
.inline-input{font-family:'DM Mono',monospace;font-size:11px;background:var(--chalk);border:1px solid var(--stone);padding:5px 8px;border-radius:1px;width:80px;color:var(--deep);}
.inline-input:focus{outline:none;border-color:var(--rust);}
.inline-textarea{font-family:'DM Mono',monospace;font-size:11px;background:var(--chalk);border:1px solid var(--stone);padding:6px 8px;border-radius:1px;width:100%;resize:vertical;min-height:48px;color:var(--deep);margin-top:6px;}
.inline-textarea:focus{outline:none;border-color:var(--rust);}
.inline-textarea::placeholder{color:var(--stone);}

.card-footer{padding:8px 12px 10px;border-top:1px solid var(--chalk);display:flex;gap:6px;}

/* DONE SESSION SUMMARY */
.summary-tech{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--moss);margin-bottom:2px;cursor:pointer;}
.summary-tech:hover{text-decoration:underline;}
.summary-cue{font-size:10px;color:var(--rock);font-style:italic;margin-bottom:10px;}
.summary-row{display:flex;gap:10px;margin-bottom:6px;}
.summary-chip{font-size:10px;background:var(--chalk);padding:3px 8px;border-radius:1px;color:var(--rock);}
.summary-chip strong{color:var(--deep);}
.progress-bar-wrap{margin:8px 0;}
.progress-label{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--stone);margin-bottom:3px;}
.progress-bar{height:5px;background:var(--chalk);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--moss);border-radius:2px;transition:width .4s;}
.summary-note{font-size:10px;color:var(--rock);font-style:italic;line-height:1.5;margin-top:6px;border-left:2px solid var(--stone);padding-left:8px;}

/* ADD SESSION FORM */
.add-panel{background:var(--warm);border:1px solid var(--stone);border-top:3px solid var(--rust);border-radius:2px;padding:20px;margin-bottom:28px;}
.add-panel h2{font-family:'Playfair Display',serif;font-size:18px;margin-bottom:14px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.form-group{display:flex;flex-direction:column;gap:4px;}
.form-group label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--rock);}
.form-group select,.form-group input,.form-group textarea{font-family:'DM Mono',monospace;font-size:12px;background:var(--chalk);border:1px solid var(--stone);padding:7px 10px;border-radius:1px;color:var(--deep);}
.form-group select:focus,.form-group input:focus,.form-group textarea:focus{outline:none;border-color:var(--rust);}
.form-group textarea{resize:vertical;min-height:52px;}

/* HISTORY */
.history-section{margin-top:8px;}
.history-title{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--rock);border-bottom:1px solid var(--stone);padding-bottom:8px;margin-bottom:14px;}
.history-row{display:grid;grid-template-columns:110px 1fr 70px 70px 72px 60px;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid var(--chalk);font-size:11px;}
.history-row.hdr{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--stone);border-bottom:1px solid var(--stone);}
.h-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;}

/* MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(44,37,32,.55);display:none;z-index:100;align-items:center;justify-content:center;}
.modal-backdrop.open{display:flex;}
.modal{background:var(--warm);border:1px solid var(--stone);border-radius:2px;max-width:560px;width:92%;max-height:85vh;overflow-y:auto;padding:28px;position:relative;}
.modal-close{position:absolute;top:14px;right:14px;background:none;border:none;font-size:18px;cursor:pointer;color:var(--rock);}
.modal-close:hover{color:var(--rust);}
.modal h2{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:4px;}
.modal-tag{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--rock);margin-bottom:16px;}
.modal-sec h3{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--rust);margin-bottom:5px;border-bottom:1px solid var(--lr);padding-bottom:3px;margin-top:14px;}
.modal-sec p{font-size:12px;line-height:1.7;}
.modal-sec ul{padding-left:16px;}
.modal-sec ul li{font-size:12px;line-height:1.7;margin-bottom:3px;}

/* CONFIRM DIALOG */
.confirm-dialog{position:fixed;inset:0;background:rgba(44,37,32,.55);z-index:200;display:none;align-items:center;justify-content:center;}
.confirm-dialog.open{display:flex;}
.confirm-box{background:var(--warm);border:1px solid var(--stone);border-radius:2px;padding:24px;max-width:320px;width:90%;}
.confirm-box p{font-size:12px;margin-bottom:16px;line-height:1.6;}
.confirm-btns{display:flex;gap:8px;}

/* EDIT MODAL */
.edit-modal-backdrop{position:fixed;inset:0;background:rgba(44,37,32,.55);z-index:150;display:none;align-items:center;justify-content:center;}
.edit-modal-backdrop.open{display:flex;}
.edit-modal{background:var(--warm);border:1px solid var(--stone);border-radius:2px;max-width:460px;width:92%;padding:24px;position:relative;}
.edit-modal h2{font-family:'Playfair Display',serif;font-size:18px;margin-bottom:14px;}

@media(max-width:680px){
  .dashboard{grid-template-columns:repeat(2,1fr);}
  .sessions-grid{grid-template-columns:1fr;}
  .history-row{grid-template-columns:90px 1fr 60px 60px;}
  .history-row .h-type,.history-row .h-del{display:none;}
}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div>
      <div style="font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--rock);margin-bottom:4px">Bouldering Tracker</div>
      <h1>Move well. <em>Get better.</em></h1>
    </div>
    <div class="header-sub">Franchesca · Movement Gym<br>V3–V4 · Target: V5</div>
  </div>

  <div class="dashboard" id="dashboard"></div>

  <div class="week-bar">
    <div style="display:flex;gap:6px">
      <button class="btn outline btn-sm" onclick="changeWeek(-1)">← Prev</button>
      <button class="btn outline btn-sm" onclick="changeWeek(1)">Next →</button>
      <button class="btn outline btn-sm" onclick="goNow()">This Week</button>
    </div>
    <div class="week-label" id="weekLabel">—</div>
    <button class="btn btn-sm" onclick="openAdd()">+ Log Session</button>
  </div>

  <div class="add-panel" id="addPanel" style="display:none">
    <h2>Log a Session</h2>
    <div class="form-row">
      <div class="form-group"><label>Date</label><input type="date" id="fDate"></div>
      <div class="form-group"><label>Session Type</label>
        <select id="fType">
          <option value="train">Training Session</option>
          <option value="free">Free Climb (with friend)</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Highest Grade Attempted</label><input type="text" id="fAttempted" placeholder="e.g. V4"></div>
      <div class="form-group"><label>Highest Grade Sent</label><input type="text" id="fSent" placeholder="e.g. V3"></div>
    </div>
    <div class="form-group" style="margin-bottom:14px"><label>Notes</label>
      <textarea id="fNotes" placeholder="What felt good? What was hard? Any wins?"></textarea>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn" onclick="saveNew()">Start Session</button>
      <button class="btn outline" onclick="closeAdd()">Cancel</button>
    </div>
  </div>

  <div class="sessions-grid" id="sessionsGrid"></div>

  <div class="history-section">
    <div class="history-title">Full Session Log</div>
    <div class="history-row hdr">
      <div>Date</div><div>Technique</div>
      <div>Attempted</div><div>Sent</div>
      <div class="h-type">Type</div><div class="h-del"></div>
    </div>
    <div id="histLog"></div>
  </div>

</div>

<!-- TECHNIQUE MODAL -->
<div class="modal-backdrop" id="techModal" onclick="closeTechModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="document.getElementById('techModal').classList.remove('open')">✕</button>
    <div id="techModalBody"></div>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div class="confirm-dialog" id="confirmDlg">
  <div class="confirm-box">
    <p>Delete this session? This can't be undone.</p>
    <div class="confirm-btns">
      <button class="btn danger btn-sm" onclick="confirmDelete()">Delete</button>
      <button class="btn outline btn-sm" onclick="document.getElementById('confirmDlg').classList.remove('open')">Cancel</button>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="edit-modal-backdrop" id="editModal">
  <div class="edit-modal">
    <button class="modal-close" onclick="closeEdit()">✕</button>
    <h2>Edit Session</h2>
    <div class="form-row">
      <div class="form-group"><label>Date</label><input type="date" id="eDate"></div>
      <div class="form-group"><label>Type</label>
        <select id="eType">
          <option value="train">Training</option>
          <option value="free">Free Climb</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Attempted</label><input type="text" id="eAttempted" placeholder="e.g. V4"></div>
      <div class="form-group"><label>Sent</label><input type="text" id="eSent" placeholder="e.g. V3"></div>
    </div>
    <div class="form-group" style="margin-bottom:14px"><label>Notes</label>
      <textarea id="eNotes" style="min-height:60px"></textarea>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn" onclick="saveEdit()">Save Changes</button>
      <button class="btn outline" onclick="closeEdit()">Cancel</button>
    </div>
  </div>
</div>

<script>
// ─── TECHNIQUES ───────────────────────────────────────────────────────────────
const TECHNIQUES = [
  {name:"Footwork",cue:'"Look at my foot before I step."',why:"Most V4 climbers muscle through with arms. Precise feet save grip for the crux.",how:"Place the inside edge or toe tip on every hold — not the flat of your shoe. Look at the hold before stepping. Aim for zero adjustment after landing. If your foot shuffles, you placed it wrong.",practice:["On 5 climbs in your volume block, narrate feet quietly: \"inside edge, toe tip\" every move.","Pick 3 V1–V2 problems. Rule: foot moves after landing = come down and restart. 2–3 attempts each.","Find one smear-y problem. Practice loading it slowly before committing weight. 3–5 attempts."]},
  {name:"Hip Position",cue:'"Turn one hip before I reach."',why:"Hips are your heaviest body part. Wrong position = arms do everything.",how:"On vertical: turn one hip toward the wall before reaching for the next hold. On overhangs: drive hips toward the wall and keep them close. Flag the free leg when unstable.",practice:["On 3 vertical V2–V3 problems, consciously turn hip before every hand move. Even when unnecessary.","Pick one overhang. Drive hips toward wall and hold for 2 seconds mid-climb. 3–4 attempts.","Find a problem where you feel unstable on one foot. Experiment with flagging. 1–2 problems."]},
  {name:"Route Reading",cue:'"30 seconds before I touch the wall."',why:"Every second spent puzzling mid-climb is pump. Reading before pulling is free rest.",how:"Stand below the problem for 30–60 seconds. Identify: right hand first? Left foot? Where is the crux? Where can I rest?",practice:["Make 30 seconds of reading non-negotiable on every V3+ attempt. Time yourself.","On challenge zone problems, verbally identify the crux before climbing. After falling, adjust the plan.","Climb one problem twice: once instinctively, once reading every hold direction first. Compare."]},
  {name:"Back Engagement",cue:'"Shoulder blade down, then pull."',why:"Pulling with arms alone burns grip fast. Your back is a much larger muscle — use it.",how:"Before pulling a hold, squeeze shoulder blades down and together first. The pull should feel like it starts in your back, not your elbow. Never move your hand before your foot.",practice:["On 3 problems per session, pause at each pull and cue \"back first.\" It will feel slow. Good.","Session rule: hand moves only after a foot has moved. Break it = come down and restart."]},
  {name:"Rest Positions",cue:'"Hang straight, shake out on every jug."',why:"At V5 problems are longer. If you can't recover mid-route, you run out of grip before the top.",how:"Hang with arms fully straight whenever possible. On any jug: drop arm below waist, open and close hand 10–15 times. During route reading, identify where you'll rest before you start.",practice:["On every easy climb, hang straight-armed on each hold you pass. Make it a reflex.","Rule: if there's a jug anywhere, stop and shake out on it even if you don't feel pumped.","During route reading, point to your rest position before climbing. Did you use it after?"]},
  {name:"Heel & Toe Hooks",cue:'"Is there anything my heel or toe could hook?"',why:"Some V4 routes require them — you can't finish without them. Spotting when to use one is the skill.",how:"Heel hook: hook the back of your heel and actively pull with your hamstring — it should feel like your leg is pulling, not resting. Toe hook: hook the top of your toe and flex your foot — it must pull, not just touch.",practice:["When you fall on a steep move, look at your feet: could a heel hook work? 2–3 attempts.","Find one problem per session where you're swinging off. Try a toe hook to counter the swing.","During route reading, scan for heel and toe opportunities the same way you scan for holds."]},
  {name:"Falling Safely",cue:'"Bend knees, tuck chin, land feet first."',why:"Relaxed falling = willingness to try hard moves = faster progression. Fear of falling limits every grade.",how:"When coming off: let go intentionally rather than clinging. Bend knees as you drop. Tuck chin, arms slightly out for balance (not locked straight). Land on balls of feet first, let knees absorb. Never reach back with straight arms — wrists break that way.",practice:["Warm-up fall practice: climb 3 moves up a V0, intentionally step off. Do 3–5 times until normal.","Practice falling from the crux of a problem you keep bailing on. Knowing the fall removes fear.","After any unexpected fall, ask: did I tense up? Try to recreate it intentionally and stay loose."]}
];

const CHECKLIST = {
  warmup:[
    {id:"wu1",text:"Light bicep curls — wake up elbows"},
    {id:"wu2",text:"Lateral raises — 10–12 reps, light"},
    {id:"wu3",text:"Hangboard jugs: 7s hang / 3s rest × 5"},
    {id:"wu4",text:"Hangboard 4-finger pocket: same"},
    {id:"wu5",text:"V0–V1 easy climbing until grip feels warm"}
  ],
  volume:[
    {id:"v1",text:"V1–V3 volume climbing with technique cue applied"},
    {id:"v2",text:"Applied cue to every climb, not just some"},
    {id:"v3",text:"Noticed one moment the cue changed something"}
  ],
  challenge:[
    {id:"c1",text:"Read the route for 30s before touching"},
    {id:"c2",text:"Attempted 1–2 V3–V4 problems"},
    {id:"c3",text:"Adjusted approach after a fall before retrying"}
  ]
};

// ─── STATE ────────────────────────────────────────────────────────────────────
let sessions = JSON.parse(localStorage.getItem('bsess') || '[]');
let techIdx   = parseInt(localStorage.getItem('btidx') || '0');
let weekOff   = 0;
let pendingDeleteId = null;
let editingId = null;

function save(){
  localStorage.setItem('bsess', JSON.stringify(sessions));
  localStorage.setItem('btidx', techIdx);
}

// ─── DATE HELPERS ─────────────────────────────────────────────────────────────
function weekStart(off=0){
  const n=new Date(), day=n.getDay();
  const diff=n.getDate()-day+(day===0?-6:1);
  const m=new Date(n); m.setDate(diff+off*7); m.setHours(0,0,0,0); return m;
}
function fmt(d){return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function fmtFull(d){return new Date(d).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}
function iso(d){return new Date(d).toISOString().split('T')[0];}
function sessionsInWeek(ws){
  const we=new Date(ws); we.setDate(we.getDate()+7);
  return sessions.filter(s=>{const d=new Date(s.date);return d>=ws&&d<we;})
    .sort((a,b)=>new Date(a.date)-new Date(b.date));
}

// ─── TECHNIQUE ────────────────────────────────────────────────────────────────
function nextTech(){return TECHNIQUES[techIdx%TECHNIQUES.length];}
function advTech(){techIdx=(techIdx+1)%TECHNIQUES.length;save();}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function renderDash(){
  const totalTrain=sessions.filter(s=>s.type==='train').length;
  const totalFree=sessions.filter(s=>s.type==='free').length;
  let streak=0;
  const sorted=[...new Set(sessions.map(s=>iso(s.date)))].sort().reverse();
  for(let i=0;i<sorted.length;i++){
    const exp=new Date(); exp.setDate(exp.getDate()-i);
    if(sorted[i]===iso(exp))streak++; else break;
  }
  const tw=sessionsInWeek(weekStart(0)).filter(s=>s.type==='train').length;
  const last12=sessions.slice(-12);
  const dots=last12.map(s=>`<div class="streak-dot ${s.type==='train'?'filled':'free'}"></div>`).join('');
  const nt=nextTech();
  document.getElementById('dashboard').innerHTML=`
    <div class="stat-card accent">
      <div class="stat-label">This Week</div>
      <div class="stat-value">${tw}<span style="font-size:16px;color:var(--stone)">/3</span></div>
      <div class="stat-sub">training sessions</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Sessions</div>
      <div class="stat-value">${totalTrain}</div>
      <div class="stat-sub">${totalFree} free climb${totalFree!==1?'s':''}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Streak</div>
      <div class="stat-value">${streak}</div>
      <div class="stat-sub">sessions in a row</div>
      <div class="streak-dots">${dots}</div>
    </div>
    <div class="stat-card" style="cursor:pointer" onclick="openTechModal('${nt.name}')">
      <div class="stat-label">Next Technique</div>
      <div style="font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:var(--rust);margin-top:4px;line-height:1.3">${nt.name}</div>
      <div class="stat-sub" style="font-style:italic;margin-top:4px">${nt.cue}</div>
    </div>`;
}

// ─── WEEK RENDER ──────────────────────────────────────────────────────────────
function renderWeek(){
  const ws=weekStart(weekOff), we=new Date(ws); we.setDate(we.getDate()+6);
  document.getElementById('weekLabel').innerHTML=`Week of <span>${fmt(ws)} – ${fmt(we)}</span>`;
  const wSess=sessionsInWeek(ws);
  const trains=wSess.filter(s=>s.type==='train');
  const frees=wSess.filter(s=>s.type==='free');
  const slots=[
    {n:1,s:trains[0]||null},
    {n:2,s:trains[1]||null},
    {n:3,s:trains[2]||null},
  ];
  if(frees.length)slots.push({n:'free',s:frees[0]});
  document.getElementById('sessionsGrid').innerHTML=slots.map(({n,s})=>{
    if(!s)return emptySlot(n);
    if(s.type==='free')return freeCard(s);
    return s.completed?doneCard(s):activeCard(s);
  }).join('');
}

// ─── EMPTY SLOT ───────────────────────────────────────────────────────────────
function emptySlot(n){
  const lbl=n==='free'?'Free Climb':`Session ${n}`;
  return`<div class="session-card empty">
    <div class="card-header"><div class="card-date">${lbl}</div><span class="card-tag tag-empty">Pending</span></div>
    <div class="card-body" style="padding:24px 12px;text-align:center;color:var(--stone);font-size:11px">Not yet logged</div>
  </div>`;
}

// ─── FREE CLIMB CARD ──────────────────────────────────────────────────────────
function freeCard(s){
  return`<div class="session-card free">
    <div class="card-header">
      <div class="card-date">${fmtFull(s.date)}</div>
      <div class="card-actions">
        <button class="btn outline btn-xs" onclick="openEdit('${s.id}')">Edit</button>
        <button class="btn danger btn-xs" onclick="askDelete('${s.id}')">✕</button>
      </div>
      <span class="card-tag tag-free">Free Climb</span>
    </div>
    <div class="card-body">
      <div style="font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--sky);margin-bottom:4px">Fun session 🧗</div>
      <div style="font-size:10px;color:var(--rock);font-style:italic;margin-bottom:8px">Climbing with friend — no structure</div>
      ${s.attempted?`<div class="summary-row"><span class="summary-chip">Tried <strong>${s.attempted}</strong></span><span class="summary-chip">Sent <strong>${s.sent||'—'}</strong></span></div>`:''}
      ${s.notes?`<div class="summary-note">${s.notes}</div>`:''}
    </div>
  </div>`;
}

// ─── ACTIVE CARD (in-progress) ────────────────────────────────────────────────
function activeCard(s){
  const t=TECHNIQUES.find(x=>x.name===s.technique)||TECHNIQUES[0];
  const allItems=[...CHECKLIST.warmup,...CHECKLIST.volume,...CHECKLIST.challenge];
  const checks=s.checks||[];

  const clSection=(items,label)=>`
    <div class="section-label">${label}</div>
    <ul class="checklist">
      ${items.map(item=>{
        const chk=checks.includes(item.id);
        return`<li class="${chk?'done-item':''}">
          <input type="checkbox" id="${s.id}_${item.id}" ${chk?'checked':''}
            onchange="toggleCheck('${s.id}','${item.id}',this.checked)">
          <label for="${s.id}_${item.id}">${item.text}</label>
        </li>`;
      }).join('')}
    </ul>`;

  return`<div class="session-card active">
    <div class="card-header">
      <div class="card-date">${fmtFull(s.date)}</div>
      <div class="card-actions">
        <button class="btn outline btn-xs" onclick="openEdit('${s.id}')">Edit</button>
        <button class="btn danger btn-xs" onclick="askDelete('${s.id}')">✕</button>
      </div>
      <span class="card-tag tag-active">In Progress</span>
    </div>
    <div class="card-body">
      <div class="tech-banner">
        <div class="tech-name" onclick="openTechModal('${t.name}')">${t.name}</div>
        <div class="tech-cue">${t.cue}</div>
      </div>
      ${clSection(CHECKLIST.warmup,'Warm-Up')}
      ${clSection(CHECKLIST.volume,'Volume Block')}
      ${clSection(CHECKLIST.challenge,'Challenge Zone')}
      <div class="inline-field">
        <label>Grades</label>
        <div class="inline-row">
          <input class="inline-input" placeholder="Attempted" value="${s.attempted||''}"
            onchange="updateField('${s.id}','attempted',this.value)" style="flex:1">
          <input class="inline-input" placeholder="Sent" value="${s.sent||''}"
            onchange="updateField('${s.id}','sent',this.value)" style="flex:1">
        </div>
      </div>
      <div class="inline-field">
        <label>Notes</label>
        <textarea class="inline-textarea" placeholder="What clicked? What didn't?"
          onchange="updateField('${s.id}','notes',this.value)">${s.notes||''}</textarea>
      </div>
    </div>
    <div class="card-footer">
      <button class="btn moss btn-sm" onclick="completeSession('${s.id}')">✓ Mark Complete</button>
    </div>
  </div>`;
}

// ─── DONE CARD (completed summary) ────────────────────────────────────────────
function doneCard(s){
  const t=TECHNIQUES.find(x=>x.name===s.technique)||TECHNIQUES[0];
  const checks=s.checks||[];
  const allItems=[...CHECKLIST.warmup,...CHECKLIST.volume,...CHECKLIST.challenge];
  const done=checks.length;
  const total=allItems.length;
  const pct=Math.round((done/total)*100);

  // which sections completed fully
  const wuDone=CHECKLIST.warmup.every(i=>checks.includes(i.id));
  const vDone=CHECKLIST.volume.every(i=>checks.includes(i.id));
  const cDone=CHECKLIST.challenge.every(i=>checks.includes(i.id));

  const sectionChip=(label,done)=>`
    <span class="summary-chip" style="background:${done?'var(--lm)':'var(--chalk)'};color:${done?'var(--moss)':'var(--stone)'}">
      ${done?'✓':''} ${label}
    </span>`;

  return`<div class="session-card done">
    <div class="card-header">
      <div class="card-date">${fmtFull(s.date)}</div>
      <div class="card-actions">
        <button class="btn outline btn-xs" onclick="reopenSession('${s.id}')">Reopen</button>
        <button class="btn outline btn-xs" onclick="openEdit('${s.id}')">Edit</button>
        <button class="btn danger btn-xs" onclick="askDelete('${s.id}')">✕</button>
      </div>
      <span class="card-tag tag-done">Done</span>
    </div>
    <div class="card-body">
      <div class="summary-tech" onclick="openTechModal('${t.name}')">${t.name}</div>
      <div class="summary-cue">${t.cue}</div>
      ${s.attempted?`<div class="summary-row"><span class="summary-chip">Tried <strong>${s.attempted}</strong></span><span class="summary-chip">Sent <strong>${s.sent||'—'}</strong></span></div>`:''}
      <div class="progress-bar-wrap">
        <div class="progress-label">Checklist — ${done}/${total} items</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="summary-row" style="flex-wrap:wrap;gap:4px;margin-top:6px">
        ${sectionChip('Warm-Up',wuDone)}
        ${sectionChip('Volume',vDone)}
        ${sectionChip('Challenge',cDone)}
      </div>
      ${s.notes?`<div class="summary-note">${s.notes}</div>`:''}
    </div>
  </div>`;
}

// ─── HISTORY ──────────────────────────────────────────────────────────────────
function renderHistory(){
  const sorted=[...sessions].sort((a,b)=>new Date(b.date)-new Date(a.date));
  document.getElementById('histLog').innerHTML=sorted.length===0
    ?'<div style="font-size:11px;color:var(--stone);padding:12px 0">No sessions yet.</div>'
    :sorted.map(s=>`
      <div class="history-row">
        <div>${fmtFull(s.date)}</div>
        <div><span class="h-dot" style="background:${s.type==='free'?'var(--sky)':'var(--rust)'}"></span>${s.type==='free'?'Free Climb':s.technique||'—'}</div>
        <div>${s.attempted||'—'}</div>
        <div>${s.sent||'—'}</div>
        <div class="h-type">${s.completed?'✓ Done':s.type==='free'?'Free':'Active'}</div>
        <div class="h-del"><button class="btn danger btn-xs" onclick="askDelete('${s.id}')">✕</button></div>
      </div>`).join('');
}

// ─── INTERACTIONS ─────────────────────────────────────────────────────────────
function toggleCheck(sid,iid,checked){
  const s=sessions.find(x=>x.id===sid); if(!s)return;
  if(!s.checks)s.checks=[];
  if(checked){if(!s.checks.includes(iid))s.checks.push(iid);}
  else s.checks=s.checks.filter(c=>c!==iid);
  save();
  const li=document.querySelector(`label[for="${sid}_${iid}"]`)?.closest('li');
  if(li)li.className=checked?'done-item':'';
}

function updateField(sid,field,val){
  const s=sessions.find(x=>x.id===sid); if(!s)return;
  s[field]=val; save();
}

function completeSession(sid){
  const s=sessions.find(x=>x.id===sid); if(!s)return;
  s.completed=true; save(); render();
}

function reopenSession(sid){
  const s=sessions.find(x=>x.id===sid); if(!s)return;
  s.completed=false; save(); render();
}

// DELETE
function askDelete(sid){
  pendingDeleteId=sid;
  document.getElementById('confirmDlg').classList.add('open');
}
function confirmDelete(){
  if(!pendingDeleteId)return;
  sessions=sessions.filter(s=>s.id!==pendingDeleteId);
  pendingDeleteId=null;
  document.getElementById('confirmDlg').classList.remove('open');
  save(); render();
}

// EDIT
function openEdit(sid){
  const s=sessions.find(x=>x.id===sid); if(!s)return;
  editingId=sid;
  document.getElementById('eDate').value=s.date;
  document.getElementById('eType').value=s.type;
  document.getElementById('eAttempted').value=s.attempted||'';
  document.getElementById('eSent').value=s.sent||'';
  document.getElementById('eNotes').value=s.notes||'';
  document.getElementById('editModal').classList.add('open');
}
function closeEdit(){
  editingId=null;
  document.getElementById('editModal').classList.remove('open');
}
function saveEdit(){
  const s=sessions.find(x=>x.id===editingId); if(!s)return;
  s.date=document.getElementById('eDate').value;
  s.type=document.getElementById('eType').value;
  s.attempted=document.getElementById('eAttempted').value.trim();
  s.sent=document.getElementById('eSent').value.trim();
  s.notes=document.getElementById('eNotes').value.trim();
  closeEdit(); save(); render();
}

// ADD
function openAdd(){
  document.getElementById('addPanel').style.display='block';
  document.getElementById('fDate').value=new Date().toISOString().split('T')[0];
  document.getElementById('addPanel').scrollIntoView({behavior:'smooth'});
}
function closeAdd(){document.getElementById('addPanel').style.display='none';}
function saveNew(){
  const date=document.getElementById('fDate').value;
  const type=document.getElementById('fType').value;
  if(!date){alert('Pick a date.');return;}
  const s={
    id:Date.now().toString(),date,type,
    attempted:document.getElementById('fAttempted').value.trim(),
    sent:document.getElementById('fSent').value.trim(),
    notes:document.getElementById('fNotes').value.trim(),
    technique:type==='train'?nextTech().name:null,
    checks:[],completed:false
  };
  sessions.push(s);
  if(type==='train')advTech();
  save(); closeAdd();
  document.getElementById('fAttempted').value='';
  document.getElementById('fSent').value='';
  document.getElementById('fNotes').value='';
  render();
}

// WEEK NAV
function changeWeek(d){weekOff+=d;renderWeek();}
function goNow(){weekOff=0;render();}

// TECH MODAL
function openTechModal(name){
  const t=TECHNIQUES.find(x=>x.name===name); if(!t)return;
  document.getElementById('techModalBody').innerHTML=`
    <h2>${t.name}</h2>
    <div class="modal-tag">Technique Focus</div>
    <div class="modal-sec"><h3>The Cue</h3><p style="font-size:15px;font-style:italic;color:var(--rust)">${t.cue}</p></div>
    <div class="modal-sec"><h3>Why It Matters</h3><p>${t.why}</p></div>
    <div class="modal-sec"><h3>How to Do It</h3><p>${t.how}</p></div>
    <div class="modal-sec"><h3>Practice in Session</h3><ul>${t.practice.map(p=>`<li>${p}</li>`).join('')}</ul></div>`;
  document.getElementById('techModal').classList.add('open');
}
function closeTechModal(e){
  if(e.target===document.getElementById('techModal'))
    document.getElementById('techModal').classList.remove('open');
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){renderDash();renderWeek();renderHistory();}
render();
</script>
</body>
</html>
